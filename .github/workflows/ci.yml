name: CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: Build and test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@017a9effdb900e5b2fddfb590a105619dca3c3 # v4.4.2

      - name: Build and test
        run: ./gradlew --no-daemon clean build

      - name: Verify local publication
        run: ./gradlew --no-daemon publishToMavenLocal
